<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiCrop - Smart Agricultural Optimization Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Top Navigation Bar -->
    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" fill="var(--primary)"/>
                </svg>
                <span>Opti<span>Crop</span></span>
            </a>
            <nav class="nav-links">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a>
                <a href="/findyourcrop" class="{% if request.path == '/findyourcrop' %}active{% endif %}">Find Your Crop</a>
                <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">Research Dashboard</a>
                <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About Engine</a>
            </nav>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 OptiCrop Engine. Empowering Sustainable and Precision Agriculture through AI.</p>
        </div>
    </footer>
    
    {% block scripts %}{% endblock %}
</body>
</html>
